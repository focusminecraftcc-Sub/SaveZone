<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - SaveZone</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <nav class="navbar">
      <a href="/" class="navbar-brand">
        <div class="logo-icon">💰</div>
        <span>SaveZone</span>
      </a>
      <div class="navbar-nav">
        <a href="/login" class="btn btn-outline">Back to Login</a>
      </div>
    </nav>

    <div class="auth-container">
      <div class="auth-card fade-in">
        <div class="auth-header">
          <div class="brand-logo">🔑</div>
          <h2>Reset Password</h2>
          <p>Enter your email and we'll send you a reset link</p>
        </div>

        <div id="alert-container"></div>

        <form id="forgot-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-group">
              <span class="input-icon">📧</span>
              <input type="email" id="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
            Send Reset Link
          </button>
        </form>

        <div class="auth-footer">
          <a href="/login">← Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('alert-container').innerHTML = '';

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';

      const email = document.getElementById('email').value.trim();
      if (!email) {
        document.getElementById('alert-container').innerHTML =
          '<div class="alert alert-danger"><span>⚠️</span> Please enter your email address</div>';
        btn.disabled = false;
        btn.innerHTML = 'Send Reset Link';
        return;
      }

      try {
        const res = await fetch('/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        document.getElementById('alert-container').innerHTML =
          `<div class="alert alert-success"><span>✅</span> ${data.message}</div>`;
        btn.innerHTML = '✅ Email Sent';
      } catch {
        document.getElementById('alert-container').innerHTML =
          '<div class="alert alert-danger"><span>⚠️</span> Something went wrong. Try again.</div>';
        btn.disabled = false;
        btn.innerHTML = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
