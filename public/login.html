<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SaveZone</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <nav class="navbar">
      <a href="/" class="navbar-brand">
        <div class="logo-icon">💰</div>
        <span>SaveZone</span>
      </a>
      <div class="navbar-nav">
        <a href="/register" class="nav-link">New here?</a>
        <a href="/register" class="btn btn-primary">Register</a>
      </div>
    </nav>

    <div class="auth-container">
      <div class="auth-card fade-in">
        <div class="auth-header">
          <div class="brand-logo">💰</div>
          <h2>Welcome back!</h2>
          <p>Sign in to your SaveZone account</p>
        </div>

        <div id="alert-container"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="identifier">Username or Email</label>
            <div class="input-group">
              <span class="input-icon">👤</span>
              <input type="text" id="identifier" name="identifier" class="form-control" placeholder="Enter username or email" autocomplete="username" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              Password
              <a href="/forgot-password" style="float:right;font-size:13px;font-weight:500;">Forgot password?</a>
            </label>
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" required>
              <button type="button" class="input-toggle" onclick="togglePassword()">👁️</button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
            Sign In
          </button>
        </form>

        <div class="auth-divider">or</div>

        <div class="auth-footer" style="margin-top:0">
          Don't have an account? <a href="/register">Create one free</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Show URL error if any
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
      document.getElementById('alert-container').innerHTML =
        `<div class="alert alert-info"><span>ℹ️</span> ${decodeURIComponent(urlParams.get('error'))}</div>`;
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.input-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('alert-container').innerHTML = '';

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing In...';

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      if (!identifier || !password) {
        document.getElementById('alert-container').innerHTML =
          '<div class="alert alert-danger"><span>⚠️</span> Please fill in all fields</div>';
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
        return;
      }

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const data = await res.json();

        if (data.success) {
          btn.innerHTML = '✅ Success! Redirecting...';
          window.location.href = data.redirect || '/search';
        } else {
          document.getElementById('alert-container').innerHTML =
            `<div class="alert alert-danger"><span>⚠️</span> ${data.message || 'Login failed'}</div>`;
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }
      } catch {
        document.getElementById('alert-container').innerHTML =
          '<div class="alert alert-danger"><span>⚠️</span> Network error. Please try again.</div>';
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
