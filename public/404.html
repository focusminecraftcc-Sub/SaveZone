<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - SaveZone</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
    .error-code { font-size: 100px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 16px; }
    .error-title { font-size: 28px; margin-bottom: 12px; }
    .error-desc { color: var(--text-gray); font-size: 16px; margin-bottom: 32px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo-icon">💰</div>
      <span>SaveZone</span>
    </a>
  </nav>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="btn btn-primary btn-lg">Go to Home</a>
    </div>
  </div>
</body>
</html>
